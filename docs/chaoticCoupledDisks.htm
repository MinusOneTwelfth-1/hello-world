<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Rotation Example</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <canvas id="myCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 100;

        // 1 revolution every 5 seconds (5000 milliseconds)
        const REVOLUTION_TIME = 5000; 

        function draw(tstamp) {
			  ctx.clearRect(0, 0, canvas.width, canvas.height);
              ctx.font = "32px serif";
			ctx.fillStyle = "blue";

			// Draw text at coordinates x=50, y=100
			ctx.fillText((1.0*tstamp / 1000).toFixed(2), 50, 100);
  
			wl.drawme(ctx,1.0*tstamp/1000)
    
    
     
           requestAnimationFrame(draw);
        }

        // Start the animation loop
   //     requestAnimationFrame(draw);
      
      class Wheel{
		constructor(cvs,X,Y,R,theta,omega,rpin)
		{this.X=cvs.width*1/3; this.Y=cvs.height*1/2; this.R=cvs.height*0.3;this.omega=2*Math.PI/5;rpin=this.R*0.2;
			this.theta=0;
			}
			
		drawme(ctx,tsec){
			this.theta= tsec * this.omega
		//	console.log('theta= ',this.theta)
			
			// 3. Draw the main outer circle
            ctx.beginPath();
            ctx.arc(this.X, this.Y, this.R, 0, 2 * Math.PI);
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = 4;
            ctx.stroke();
			
			ctx.beginPath();
            ctx.moveTo(this.X, this.Y);
            // Calculate end point of the line using trigonometry
            const markerX = this.X + this.R * Math.cos(this.theta);
            const markerY = this.Y + this.R * Math.sin(this.theta);
            ctx.lineTo(markerX, markerY);
            ctx.strokeStyle = '#ff3333';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.stroke();
            
                     ctx.beginPath();
            ctx.arc(this.X, this.Y, 8, 0, 2 * Math.PI);
            ctx.fillStyle = '#333333';
            ctx.fill();
            
          //  requestAnimationFrame((t)=>{tt=t;wl.drawme(ctx,t);console.log(t % 1000);console.log(tt)})
		}
	 
  }
        
 
		
    </script>
</body>
</html>
