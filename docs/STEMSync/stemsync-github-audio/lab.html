<!-- lab.html -->
<style>

canvas {border: solid lightgrey 8px;
    
}
.canvas-container {text-align: center;}
 
.container {padding: 7px;}
.control-group {display: flex; flex-direction: column;}
.control-group label {
            font-weight: bold;
            margin-bottom: 5px;
        }
.controls {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 20px;
        }

        .inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .inputs input[type=""range""] {
            flex: 1;
        }
        .inputs input[type=""number""] {
            width: 60px;
        }
 
              .btn-container {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        button.stop {
            background-color: #dc3545;
        }
        button.stop:hover {
            background-color: #bd2130;
        }

    #msgbox {height: 5rem; width: 100%}
</style>
 

<div class=""container"">
  <div>
<ul>
<li>Use either the sliders or type directly into the text boxes to alter the physics constants.</li>
<li>Click and hold the blue mass circle with your mouse or finger to pull it to an initial height.
<li>Click Start to watch it bounce based on your chosen mass and stiffness configuration.</li>
</ul>
</div>
    <div class=""controls"">
        <div class=""control-group"">
            <label for=""mass"">Mass (kg)</label>
            <div class=""inputs"">
                <input type=""range"" id=""massSlider"" min=""1"" max=""20"" step=""0.5"" value=""5"">
                <input type=""number"" id=""massText"" min=""1"" max=""20"" step=""0.5"" value=""5"">
            </div>
        </div>
        <div class=""control-group"">
            <label for=""stiffness"">Stiffness (N/m)</label>
            <div class=""inputs"">
                <input type=""range"" id=""stiffnessSlider"" min=""5"" max=""100"" step=""1"" value=""20"">
                <input type=""number"" id=""stiffnessText"" min=""5"" max=""100"" step=""1"" value=""20"">
            </div>
        </div>
    </div>

    <div class=""btn-container"">
        <button id=""startStopBtn"">Start</button>
    </div>
    <div class=""canvas-container"">
    <canvas id=""simCanvas"" width=""500"" height=""500""></canvas>
    </div>
   
    <textarea id='msgbox'></textarea>
</div>
