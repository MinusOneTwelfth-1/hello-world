<script>
   // ===== HELPER: Append message to UI =====
  function appendMessage(text, from) {
    const div = document.createElement('div');
    div.textContent = (from ? `[${from}] ` : '') + text;
    msgList.appendChild(div);
    msgList.scrollTop = msgList.scrollHeight;
  }


// ===== Setup data channel events =====
  function setupDataChannel(channel) {
    channel.onopen = () => {
      sendBtn.textContent='Send'
      sendBtn.disabled=true
      console.log('channel open')
      isConnected = true;
      appendMessage('📡 Data channel open', 'System');
      sendBtn.disabled = false;

      statusDiv.textContent = '✅ Data channel ready!';
    };
    channel.onclose = () => {
      isConnected = false;
      appendMessage('❌ Data channel closed', 'System');
      sendBtn.disabled = true;
      statusDiv.textContent = '⚠️ Data channel closed';
    };
    channel.onmessage = (event) => {
      appendMessage(event.data, 'Peer');
     console.log('got a message')
    try {
    console.log('looking for JSON in msg: '+event.data )  
    jsn=JSON.parse(event.data);
    console.log('parsed ok.. setting param')
    setParam(jsn)

  } catch (e) {
    console.log('caught json error')
  }
    };
  } 

const errorLog = [];

// Capture standard runtime errors (syntax, reference, type errors)
window.addEventListener('error', (event) => {
  console.log('@@@@@ ERROR ####'); console.log(event)
  errorLog.push(event.error || new Error(event.message));
 // event.preventDefault(); // Prevents the error from printing to the browser console
});

// Capture unhandled async promise rejections
window.addEventListener('unhandledrejection', (event) => {
  console.log('@@@@@ promise rej @@@@@@'); console.log(event)
  errorLog.push(event.reason);
 // event.preventDefault(); 
});



//# sourceURL='praveen.com/inline.js'
